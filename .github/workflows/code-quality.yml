name: Code Quality

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  code-quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Linter
        run: npm run lint
        continue-on-error: true

      - name: TypeScript Type Check
        run: npx tsc --noEmit
        continue-on-error: true

      - name: Check Code Formatting
        run: |
          npm install -g prettier
          prettier --check "src/**/*.{ts,html,scss,css,json}"
        continue-on-error: true

      - name: Run Tests with Coverage
        run: npm test -- --watch=false --browsers=ChromeHeadless --code-coverage

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=hafalat-frontend
            -Dsonar.organization=your-org
            -Dsonar.sources=src
            -Dsonar.tests=src
            -Dsonar.test.inclusions=**/*.spec.ts
            -Dsonar.typescript.lcov.reportPaths=coverage/lcov.info
            -Dsonar.coverage.exclusions=**/*.spec.ts,**/*.module.ts,**/main.ts

      - name: Dependency Review
        uses: actions/dependency-review-action@v3
        if: github.event_name == 'pull_request'

      - name: Check for Security Vulnerabilities
        run: npm audit --audit-level=moderate
        continue-on-error: true

      - name: Generate Quality Report
        if: always()
        run: |
          echo "## Code Quality Summary" >> $GITHUB_STEP_SUMMARY
          echo "### Checks Performed:" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Linting" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Type Checking" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Code Formatting" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Test Coverage" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Security Audit" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ SonarCloud Analysis" >> $GITHUB_STEP_SUMMARY

      - name: Upload Quality Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: quality-reports
          path: |
            coverage/
            *.log
